version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saas_postgres
    restart: always
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: saas_password
      POSTGRES_DB: saas_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d saas_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    container_name: saas_backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://saas_user:saas_password@db:5432/saas_db?schema=public
      - JWT_SECRET=super_secret_jwt_key_for_development_only
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: saas_frontend
    restart: always
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
